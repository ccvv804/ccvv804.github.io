<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="wasm_exec.js"></script>
		<script>
		const go = new Go();
			WebAssembly.instantiateStreaming(fetch("shio.wasm"), go.importObject).then((result) => {
				go.run(result.instance);
			});
		</script>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
		<title>시오리코</title>
	</head>
	<body>
		웹어셈블리 시오리코<br>
		프로그램이 작동하지 않는다면 새로고침 해주시면 됩니다.<br>	
	</body>
</html>
